<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LG DoDo — 가전 제어</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "LG Smart UI", "Inter";
        background: var(--bg-white);
        padding: 20px;
      }

      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
        position: relative;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      .home-btn {
        position: absolute;
        left: 0;
        right: inherit;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        margin: 0;
        letter-spacing: -1px;
      }
      /* Devices Grid — responsive layout */
      .devices-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        align-items: stretch;
      }

      .control-button {
        display: flex;
        align-items: center;
        gap: 40px;
        background: var(--bg-w-b);
        border: 4px solid var(--bg-white);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 4px 4px rgba(0, 0, 0, 0.08);
        border-radius: 20px;
        padding: 20px 32px;
        cursor: pointer;
        box-sizing: border-box;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
        user-select: none;
      }

      .control-button:active {
        transform: scale(0.98);
      }

      /* TV Icon */
      .control-icon {
        flex-shrink: 0;
        width: 120px;
        height: 120px;
      }

      /* Text Section */
      .control-info {
        display: flex;
        flex-direction: column;
        gap: 20px;
        text-align: left;
      }

      .control-name {
        font-size: 4rem;
        font-weight: 800;
        color: var(--f-b-w);
        line-height: 1;
        letter-spacing: -0.5px;
      }

      .control-status {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--p-red);
        flex-shrink: 0;
      }

      .status-dot.on {
        background: var(--p-green);
      }
      .status-dot.save {
        background: var(--p-yellow);
      }

      .status-label {
        font-size: 3rem;
        font-weight: 700;
        color: var(--f-b-w);
      }

      /* Power-off Button */
      .power-off-btn {
        appearance: none;
        border: 3px solid var(--f-b-w);
        background: var(--p-red);
        color: var(--f-b-w-w);
        padding: 16px 24px;
        border-radius: 50px;
        font-size: clamp(1rem, 4vw, 2rem);
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(233, 81, 81, 0.2);
        transition:
          background 200ms ease,
          box-shadow 200ms ease,
          transform 100ms ease;
      }

      .power-off-btn:hover {
        background: var(--p-red-hover);
        box-shadow: 0 8px 20px rgba(233, 81, 81, 0.3);
      }

      .power-off-btn:active {
        transform: scale(0.98);
      }

      .confirm-dialog {
        margin: 160px auto;
        width: 100%;
        max-width: 640px;
        border-radius: 28px;
        overflow: hidden;
        background: var(--bg-w-b);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      }

      .confirm-message {
        padding: 56px 32px 64px;
        text-align: center;
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        line-height: 1.4;
      }

      .confirm-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .confirm-btn {
        border: none;
        padding: 40px 0;
        font-size: 2.25rem;
        font-weight: 700;
        cursor: pointer;
        color: var(--p-black);
        transition: opacity 0.15s ease;
      }

      .confirm-btn:active {
        opacity: 0.8;
      }

      .confirm-btn.yes {
        background: var(--p-green);
      }

      .confirm-btn.yes:hover {
        background: var(--p-green-hover);
      }

      .confirm-btn.no {
        background: #d9d9d9;
      }

      .confirm-btn.no:hover {
        background: #cccccc;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <div class="overlay" style="display: none" id="popupOverlay">
        <div
          class="confirm-dialog"
          role="alertdialog"
          aria-modal="true"
          aria-labelledby="confirmMessage"
        >
          <p class="confirm-message" id="confirmMessage">
            정말 모든 기기 전원을<br />끄시겠습니까?
          </p>
          <div class="confirm-actions">
            <button
              class="confirm-btn yes"
              id="yesBtn"
              type="button"
              onclick="closePopup()"
            >
              예
            </button>
            <button
              class="confirm-btn no"
              id="noBtn"
              type="button"
              onclick="closePopup()"
            >
              아니요
            </button>
          </div>
        </div>
      </div>
      <header>
        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
        <h1>가전 제어</h1>
      </header>

      <section class="devices-grid" role="region" aria-label="가전 제어">
        <button
          class="control-button"
          onclick="location.href = 'control_tv.html'"
          aria-label="스마트 TV 전원 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/aff79db5-abca-440c-9813-87215dcb4f4a"
            alt="스마트 TV 아이콘"
          />

          <div class="control-info">
            <span class="control-name">스마트 TV</span>
            <div class="control-status">
              <span class="status-dot" id="statusDot"></span>
              <span class="status-label" id="statusLabel">꺼짐</span>
            </div>
          </div>
        </button>

        <button
          class="control-button"
          onclick="location.href = 'control_laundry.html'"
          aria-label="세탁기 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/e6958228-87d8-4bc3-98b8-44c73854c226"
            alt="세탁기"
          />

          <div class="control-info">
            <span class="control-name">세탁기</span>
            <div class="control-status">
              <span class="status-dot on" id="statusDot"></span>
              <span class="status-label" id="statusLabel"
                >40분 남음 · 세척</span
              >
            </div>
          </div></button
        ><button
          class="control-button"
          onclick="location.href = 'control_ac.html'"
          aria-label="에어컨 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/912f8136-1867-4437-b045-3d7b57b43763"
            alt="에어컨"
          />

          <div class="control-info">
            <span class="control-name">에어컨</span>
            <div class="control-status">
              <span class="status-dot on" id="statusDot"></span>
              <span class="status-label" id="statusLabel">24°C · 냉방</span>
            </div>
          </div>
        </button>
        <button
          class="control-button"
          onclick="location.href = 'control_stove.html'"
          aria-label="전기레인지 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/978d0c07-9fc6-425b-8adc-92a01b0608e0"
            alt="전기레인지"
          />

          <div class="control-info">
            <span class="control-name">전기레인지</span>
            <div class="control-status">
              <span class="status-dot on" id="statusDot"></span>
              <span class="status-label" id="statusLabel">16분 사용 중</span>
            </div>
          </div>
        </button>
        <button
          class="control-button"
          onclick="location.href = 'control_cleaner.html'"
          aria-label="로봇청소기 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/92bd4a3d-95ea-4d26-aff6-8e71ae75ff05"
            alt="로봇청소기"
          />

          <div class="control-info">
            <span class="control-name">로봇청소기</span>
            <div class="control-status">
              <span class="status-dot" id="statusDot"></span>
              <span class="status-label" id="statusLabel">충전 중 · 81%</span>
            </div>
          </div>
        </button>

        <button
          class="control-button"
          onclick="location.href = 'control_puri.html'"
          aria-label="공기청정기 토글"
        >
          <img
            class="control-icon"
            src="https://www.figma.com/api/mcp/asset/19f5b566-30d9-41e6-a27a-1aa36042cf01"
            alt="공기청정기"
          />

          <div class="control-info">
            <span class="control-name">공기청정기</span>
            <div class="control-status">
              <span class="status-dot save" id="statusDot"></span>
              <span class="status-label" id="statusLabel"
                >절전 · 공기 좋음</span
              >
            </div>
          </div>
        </button>
      </section>

      <button class="power-off-btn" type="button" onclick="openPopup()">
        모든 기기 전원 끄기
      </button>
    </main>

    <script>
      const popupOverlay = document.getElementById("popupOverlay");

      function openPopup() {
        popupOverlay.style.display = "block";
      }

      function closePopup() {
        popupOverlay.style.display = "none";
      }

      if (voiceMode == "true") {
        speak(
          "가전 제어, 스마트 티비, 세탁기, 에어컨, 전기레인지, 로봇청소기, 공기청정기, 모든 기기 전원 끄기"
        );
      }
    </script>
  </body>
</html>
