<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LG DoDo — 마이페이지</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      .mypage {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
        position: relative;
        overflow: hidden;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      .home-btn {
        position: absolute;
        left: 20px;
        right: inherit;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        margin: 0;
        letter-spacing: -1px;
      }
      .power-off-btn {
        appearance: none;
        border: 3px solid var(--f-b-w);
        background: var(--lg-red);
        color: var(--bg-w-b);
        padding: 16px 24px;
        border-radius: 50px;
        font-size: clamp(1rem, 4vw, 2rem);
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(233, 81, 81, 0.2);
        transition:
          background 200ms ease,
          box-shadow 200ms ease,
          transform 100ms ease;
      }

      .power-off-btn:hover {
        background: var(--p-red-hover);
        box-shadow: 0 8px 20px rgba(233, 81, 81, 0.3);
      }

      .power-off-btn:active {
        transform: scale(0.98);
      }
      .main-section {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 28px;
      }
      .right-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 28px;
        flex: 1;
      }

      .card {
        width: 100%;
        border: var(--border);
        background: var(--bg-grey);
        border-radius: 20px;
        padding: 48px 56px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex: 1;
      }
      .user-profile {
        width: 100%;
        border: var(--border);
        background: var(--bg-grey);
        border-radius: 20px;
        padding: 80px 56px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 40px;
        flex: 1;
        justify-content: start;
      }
      .nickname {
        display: flex;
        flex-direction: row;
        align-items: center;
      }
      .setting-btn {
        width: 100%;
        background: var(--bg-w-b);
        border: var(--border);
        border-radius: 20px;
        padding: 40px 28px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 16px;
        flex: 1;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(200, 200, 200, 0.5);
        transition:
          background 200ms ease,
          box-shadow 200ms ease,
          transform 100ms ease;
      }

      .setting-btn:hover {
        background: var(--grey-hover);
        box-shadow: 0 8px 20px rgba(200, 200, 200, 0.8);
      }
      .setting-btn:active {
        transform: scale(0.98);
      }

      .left-align {
        display: flex;
        flex-direction: column;
        align-items: start;
      }
      .label-bold {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        margin: 0;
      }
      .label-reg {
        font-size: 2rem;
        color: var(--f-b-w);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main class="mypage">
      <header>
        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
        <h1>마이페이지</h1>
      </header>
      <section class="main-section">
        <div class="user-profile">
          <img src="src/icon_user.png" alt="유저 아이콘" height="200" />
          <div>
            <div class="nickname">
              <p class="label-bold">userName</p>
              <div style="width: 16px"></div>
              <img src="src/icon_edit.png" alt="편집 아이콘" height="40" />
            </div>
            <div style="height: 24px"></div>
            <p class="label-reg">@ lgMemberUid</p>
          </div>
        </div>
        <div class="right-col">
          <div class="card">
            <p class="label-bold">비상 연락망</p>
            <p class="label-reg">010-1234-5678</p>
            <img src="src/icon_edit.png" alt="편집 아이콘" height="40" />
          </div>
          <button
            class="setting-btn"
            onclick="location.href = 'settings.html'"
            type="button"
            aria-label="설정으로 이동"
          >
            <img src="src/icon_setting.png" alt="설정 아이콘" height="80" />
            <div class="left-align">
              <p class="label-bold">환경 설정</p>
              <div style="height: 20px"></div>
              <p class="label-reg">음성 알림, 큰 글씨, 고대비, 색상 보정</p>
            </div>
          </button>
        </div>
      </section>
      <button class="power-off-btn" type="button">로그아웃</button>
    </main>
    <script>
      if (voiceMode == "true") {
        speak("마이페이지");
      }
    </script>
  </body>
</html>
