<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 전기레인지</title>
    <style>
      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
        font-family:
          "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
        min-height: 100vh;
        padding: 24px;
      }
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 80vh;
        min-height: 80vh;
        background: #f4f6f9;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      .back-btn {
        position: absolute;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      .back-btn .arrow {
        font-size: 3rem;
        color: #1a1a1a;
        line-height: 1;
      }

      .back-btn .label {
        font-size: 1.75rem;
        color: #1a1a1a;
      }

      .home-btn {
        position: absolute;
        right: 0;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Status Card */
      .status-card {
        background: linear-gradient(180deg, #d7d8db, #d2ddf7);
        border-radius: 20px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .status-top {
        width: 90%;
        display: flex;
        flex-direction: row;
        flex: 1;
        align-items: center;
        justify-content: space-between;
      }

      .dot-label {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }

      .status-dot {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #2f9e44;
        flex-shrink: 0;
        margin-right: 16px;
      }

      .status-dot.sleep {
        background: #e03131;
      }
      .status-dot.charge {
        background: #ffd050;
      }
      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: #1a1a1a;
        text-align: center;
      }
      .status-top-label {
        font-size: 3rem;
        font-weight: 700;
        color: #1a1a1a;
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: #444;
        text-align: center;
      }
      .current-status {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      /* Power Button */
      .power-btn {
        background: #e95151;
        color: #000;
        border: none;
        border: 6px solid #000;
        border-radius: 24px;
        padding: 24px;
        font-size: 3rem;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }

      .power-btn:hover {
        background: #c92a2a;
      }
      .power-btn:active {
        transform: scale(0.97);
      }
      .charge-btn {
        background: #ffd050;
        color: #000;
        border: none;
        border: 9px solid #000;
        border-radius: 20px;
        padding: 52px;
        font-size: 6.5rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
        position: relative;
        overflow: hidden;
      }

      .charge-btn:hover {
        background: #ffc060;
      }
      .charge-btn:active {
        transform: scale(0.97);
      }

      /* ── Control Panel (온도 / 바람) ── */
      .control-panel {
        border: 9px solid #1a1a1a;
        border-radius: 20px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: #fff;
        position: relative;
        overflow: hidden;
      }

      .ctrl-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 22px 0;
        font-size: 5rem;
        font-weight: 900;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
      }

      .ctrl-btn:active {
        transform: scale(0.96);
        opacity: 0.85;
      }

      .ctrl-btn.blue {
        background: #5799ec;
        color: #1a1a1a;
      }
      .ctrl-btn.yellow {
        background: #ffd050;
        color: #1a1a1a;
      }

      .ctrl-label {
        font-size: 5rem;
        font-weight: 700;
        color: #1a1a1a;
      }
      .status-card.off {
        background: linear-gradient(180deg, #d9d9d9, #e8a0b0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
      }

      /* Power button states */
      .power-btn.off {
        background: #e03131; /* red - turn off */
      }

      .power-btn.on {
        background: #2f9e44; /* green - turn on */
      }

      .power-btn.off:hover {
        background: #c92a2a;
      }
      .power-btn.on:hover {
        background: #276e35;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(100, 100, 100, 0.55);
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>전기레인지</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <div class="left-col">
          <div class="status-card" id="statusCardOne">
            <div class="status-top">
              <div class="status-top-label">1번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotOne"></div>
                <div class="status-top-label" id="statusLabelOne">사용 중</div>
              </div>
            </div>
            <div class="status-top" id="statusOne">
              <div>
                <div class="status-value">8</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">59분</div>
                <div class="status-label">타이머</div>
              </div>
              <button class="power-btn" onclick="togglePower('One')">
                끄기
              </button>
            </div>
          </div>
          <div class="status-card off" id="statusCardTwo">
            <div class="status-top">
              <div class="status-top-label">2번 화구</div>
              <div class="dot-label">
                <div class="status-dot sleep" id="statusDotTwo"></div>
                <div class="status-top-label" id="statusLabel">꺼짐</div>
              </div>
            </div>
          </div>
        </div>
        <div class="left-col">
          <div class="status-card" id="statusCardThree">
            <div class="status-top">
              <div class="status-top-label">3번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotThree"></div>
                <div class="status-top-label" id="statusLabelThree">
                  사용 중
                </div>
              </div>
            </div>
            <div class="status-top" id="statusThree">
              <div>
                <div class="status-value">4</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">48분</div>
                <div class="status-label">타이머</div>
              </div>
              <button class="power-btn" onclick="togglePower('Three')">
                끄기
              </button>
            </div>
          </div>
          <div class="status-card" id="statusCardFour">
            <div class="status-top">
              <div class="status-top-label">4번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotFour"></div>
                <div class="status-top-label" id="statusLabelFour">사용 중</div>
              </div>
            </div>
            <div class="status-top" id="statusFour">
              <div>
                <div class="status-value">5</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">55분</div>
                <div class="status-label">타이머</div>
              </div>
              <button
                class="power-btn"
                id="powerBtnFour"
                onclick="togglePower('Four')"
              >
                끄기
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>
      function togglePower(num) {
        const status = document.getElementById(`status${num}`);
        const statusDot = document.getElementById(`statusDot${num}`);
        const statusLabel = document.getElementById(`statusLabel${num}`);
        const statusCard = document.getElementById(`statusCard${num}`);
        status.style.display = "none";
        statusDot.classList.add("sleep");
        statusLabel.textContent = "꺼짐";
        statusCard.classList.add("off");
      }
    </script>
  </body>
</html>
