<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 환경 설정</title>

    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>

    <style>
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }
      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* Status Card */
      .status-card {
        background: var(--bg-w-b);
        border-radius: 50px;
        padding: 40px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        position: relative;
      }
      .slider {
        position: absolute;
        top: 0;
        left: 25%;
        height: 100%;
        width: 75%;
        border-radius: 50px;
        padding: 40px;
        display: flex;
        flex-direction: column;
        background: var(--bg-grey);
        align-items: flex-start;
        transition:
          left 0.3s ease,
          background 0.3s ease;
      }
      .slider.on {
        left: 0;
        background: var(--p-green);
      }
      .status-value {
        font-size: 4rem;
        font-weight: 800;
        color: var(--f-b-w);
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: var(--f-b-w);
        margin-top: 8px;
        text-align: center;
      }

      .all-btn {
        background: var(--p-blue);
        color: var(--f-b-w);
        border: 5px solid var(--p-black);
        border-radius: 50px;
        padding: 28px;
        font-size: 4rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }

      .all-btn:active {
        transform: scale(0.97);
      }
      .all-btn:hover {
        background: var(--p-blue-hover);
      }
      .slider-btn {
        border: var(--border);
        border-radius: 50px;
        background: transparent;
        cursor: pointer;
      }
      .all-dismiss-btn {
        background: var(--p-red);
        color: var(--f-b-w);
        border: 5px solid var(--p-black);
        border-radius: 50px;
        padding: 28px;
        font-size: 4rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }

      .all-dismiss-btn:active {
        transform: scale(0.97);
      }
      .all-dismiss-btn:hover {
        background: var(--p-red-hover);
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>환경 설정</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <!-- Left: status + power -->
        <div class="left-col">
          <button class="slider-btn" onclick="toggleVoice()">
            <div class="status-card">
              <img
                src="src/icon_voice.png"
                alt="음성 알림 아이콘"
                width="120"
                height="120"
              />
              <img
                src="src/icon_voice.png"
                alt="음성 알림 아이콘"
                width="120"
                height="120"
              />
              <div class="slider" id="voicePanel">
                <div class="status-value">음성 알림 모드</div>
                <div class="status-label">친절한 음성 알림입니다</div>
              </div>
            </div>
          </button>
          <button class="slider-btn" onclick="toggleContrast()">
            <div class="status-card">
              <img
                src="src/icon_contrast.png"
                alt="고대비 아이콘"
                width="120"
                height="120"
              />
              <img
                src="src/icon_contrast.png"
                alt="고대비 아이콘"
                width="120"
                height="120"
              />
              <div class="slider" id="contrastPanel">
                <div class="status-value">고대비 모드</div>
                <div class="status-label">어두운 배경으로 바꿔줍니다</div>
              </div>
            </div>
          </button>
          <button class="all-btn" id="selectBtn" onclick="turnOnAll()">
            모두 선택
          </button>
        </div>
        <div class="left-col">
          <button class="slider-btn" onclick="toggleBig()">
            <div class="status-card">
              <img
                src="src/icon_big.png"
                alt="큰글씨 아이콘"
                width="120"
                height="120"
              />
              <img
                src="src/icon_big.png"
                alt="큰글씨 아이콘"
                width="120"
                height="120"
              />
              <div class="slider" id="bigPanel">
                <div class="status-value">큰 글씨 모드</div>
                <div class="status-label">글씨가 더 커집니다</div>
              </div>
            </div>
          </button>
          <button class="slider-btn" onclick="toggleColor()">
            <div class="status-card">
              <img
                src="src/icon_color.png"
                alt="색상보정 아이콘"
                width="120"
                height="120"
              />
              <img
                src="src/icon_color.png"
                alt="색상보정 아이콘"
                width="120"
                height="120"
              />
              <div class="slider" id="colorPanel">
                <div class="status-value">색상 보정 모드</div>
                <div class="status-label">색약·색맹을 위한 화면입니다</div>
              </div>
            </div>
          </button>
          <button
            class="all-dismiss-btn"
            id="dismissBtn"
            onclick="turnOffAll()"
          >
            모두 해제
          </button>
        </div>
      </div>
    </main>
    <script>
      let voiceOn = false;
      let contrast = false;
      let big = false;
      let color = false;
      const voicePanel = document.getElementById("voicePanel");
      const contrastPanel = document.getElementById("contrastPanel");
      const bigPanel = document.getElementById("bigPanel");
      const colorPanel = document.getElementById("colorPanel");

      function updateTheme() {
        if (color && !contrast) setTheme("color");
        if (color && contrast) setTheme("contcolor");
        if (!color && contrast) setTheme("contrast");
        if (!color && !contrast) setTheme("default");
      }
      function turnOffAll() {
        voiceOn = false;
        contrast = false;
        big = false;
        color = false;
        colorPanel.classList.remove("on");
        contrastPanel.classList.remove("on");
        voicePanel.classList.remove("on");
        bigPanel.classList.remove("on");
        updateTheme();
        setRootFontSize(16);
        setVoiceMode(false);
      }
      function turnOnAll() {
        voiceOn = true;
        contrast = true;
        big = true;
        color = true;
        colorPanel.classList.add("on");
        contrastPanel.classList.add("on");
        voicePanel.classList.add("on");
        bigPanel.classList.add("on");
        updateTheme();
        setRootFontSize(20);
        setVoiceMode(true);
      }
      function toggleColor() {
        color = !color;
        if (color) {
          colorPanel.classList.add("on");
        } else {
          colorPanel.classList.remove("on");
        }
        updateTheme();
      }
      function toggleContrast() {
        contrast = !contrast;
        if (contrast) {
          contrastPanel.classList.add("on");
        } else {
          contrastPanel.classList.remove("on");
        }
        updateTheme();
      }
      function toggleVoice() {
        voiceOn = !voiceOn;
        if (voiceOn) {
          voicePanel.classList.add("on");
          setVoiceMode(true);
        } else {
          voicePanel.classList.remove("on");
          setVoiceMode(false);
        }
      }

      function toggleBig() {
        big = !big;
        if (big) {
          bigPanel.classList.add("on");
          setRootFontSize(20);
        } else {
          bigPanel.classList.remove("on");
          setRootFontSize(16);
        }
      }
      function setLocalVar() {
        if (voiceMode == "true") {
          voiceOn = true;
          voicePanel.classList.add("on");
        }
        if (savedSize == "20") {
          big = true;
          bigPanel.classList.add("on");
        }
        if (savedTheme == "default") return;
        if (savedTheme == "contcolor") {
          contrast = true;
          color = true;
          contrastPanel.classList.add("on");
          colorPanel.classList.add("on");
        }
        if (savedTheme == "color") {
          color = true;
          colorPanel.classList.add("on");
        }
        if (savedTheme == "contrast") {
          contrast = true;
          contrastPanel.classList.add("on");
        }
      }

      // On page load, restore saved preference
      setLocalVar();
      if (voiceMode == "true") {
        speak(
          "환경 설정, 음성 알림 모드, 고대비 모드, 큰 글씨 모드, 색상 보정 모드"
        );
      }
    </script>
  </body>
</html>
