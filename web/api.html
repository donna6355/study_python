<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>API 실습</title>
    <style>
      body {
        font-family: "Pretendard", sans-serif;
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f5f5f5;
      }

      .post-card {
        background: white;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .post-card h3 {
        margin-top: 0;
        color: #333;
      }

      .post-card p {
        color: #666;
        line-height: 1.6;
      }
      .pokemon-card {
        text-align: center;
        width: 250px;
        padding: 20px;
        border-radius: 15px;
        background: linear-gradient(135deg, #f6d365, #fda085);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin: 50px auto;
        color: white;
      }
      .pokemon-card img {
        width: 150px;
        height: 150px;
      }
      .pokemon-card h2 {
        text-transform: capitalize;
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <h1>게시글 목록</h1>
    <div id="post-list"></div>
    <div id="card-container"></div>

    <script>
      async function 게시글보여주기() {
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/posts"
        );
        const posts = await response.json();

        const container = document.querySelector("#post-list");

        for (let i = 0; i < 10; i++) {
          const div = document.createElement("div");
          div.className = "post-card"; // 클래스 추가!
          div.innerHTML = `
          <h3>${posts[i].title}</h3>
          <p>${posts[i].body}</p>
          <hr>
        `;
          container.appendChild(div);
        }
      }

      게시글보여주기();

      async function 포켓몬카드만들기(이름) {
        const container = document.querySelector("#card-container");
        // 로딩 시작
        container.innerHTML = "<p>불러오는 중...</p>";

        try {
          const response = await fetch(
            `https://pokeapi.co/api/v2/pokemon/${이름}`
          );
          const pokemon = await response.json();

          const card = document.createElement("div");
          card.className = "pokemon-card";
          card.innerHTML = `
          <img src="${pokemon.sprites.front_default}" alt="${pokemon.name}">
          <h2>${pokemon.name}</h2>
          <p>타입: ${pokemon.types[0].type.name}</p>
          <p>키: ${pokemon.height * 10}cm</p>
          <p>몸무게: ${pokemon.weight / 10}kg</p>
        `;
          container.appendChild(card);

          result.innerHTML = `<p>오류 발생: ${error.message}</p>`;
        }
      }

      포켓몬카드만들기("pikachu");
      포켓몬카드만들기("charmander");
      포켓몬카드만들기("bulbasaur");
    </script>
  </body>
</html>
