<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>YUNIQ Diary - Day 2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="status">로딩 중...</h1>
    <p id="project-id"></p>

    <!-- 로그인 전 영역 -->
    <div id="logged-out-area">
      <!-- 회원가입 폼 -->
      <h2>회원가입</h2>
      <form id="signup-form">
        <input type="email" id="signup-email" placeholder="이메일" required />
        <input
          type="password"
          id="signup-password"
          placeholder="비밀번호 (6자 이상)"
          required
        />
        <button type="submit">가입</button>
      </form>

      <!-- 로그인 폼 -->
      <h2>로그인</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="이메일" required />
        <input
          type="password"
          id="login-password"
          placeholder="비밀번호"
          required
        />
        <button type="submit">로그인</button>
      </form>

      <!-- 비번 재설정 -->
      <p>
        <a href="#" id="reset-password-link">비밀번호 잊으셨나요?</a>
      </p>

      <!-- 구글 로그인 -->
      <h2>또는 구글로 로그인</h2>
      <button id="google-login-btn">구글로 로그인</button>
    </div>

    <!-- 로그인 후 영역 -->
    <div id="logged-in-area" style="display: none">
      <h2>환영합니다</h2>
      <img
        id="user-photo"
        width="60"
        style="border-radius: 50%; display: none; margin: 0 auto"
        referrerpolicy="no-referrer"
        alt="프로필"
      />
      <p id="user-name"></p>
      <p id="user-email"></p>

      <!-- 이메일 인증 안내 (인증 미완료 시만 표시) -->
      <div
        id="verify-notice"
        style="
          display: none;
          padding: 12px;
          background: #fff8e1;
          border-left: 4px solid #f9a825;
          margin: 16px auto;
          max-width: 400px;
          text-align: left;
        "
      >
        <p>메일함을 확인하고 인증 링크를 클릭해주세요.</p>
        <button id="resend-verification-btn">인증 메일 재전송</button>
      </div>

      <button id="logout-btn">로그아웃</button>

      <h2>일기 쓰기</h2>
      <form id="diary-form">
        <input type="text" id="diary-title" placeholder="제목" required />
        <textarea
          id="diary-content"
          placeholder="오늘 있었던 일을 적어보세요"
          rows="4"
          required
        ></textarea>
        <button type="submit">일기 저장</button>
      </form>

      <h2>내 일기 목록</h2>
      <form id="search-form" style="margin-bottom: 12px">
        <input
          type="text"
          id="search-keyword"
          placeholder="제목으로 검색"
          style="width: 60%"
        />
        <button type="submit">검색</button>
        <button type="button" id="search-reset">초기화</button>
      </form>
      <div id="diary-list"></div>
      <button id="load-more-btn" style="margin-top: 12px; display: none">
        더 보기
      </button>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
