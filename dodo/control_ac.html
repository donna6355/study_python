<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 에어컨</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1.3fr 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* Status Card */
      .status-card {
        border: var(--border);
        background: var(--gr-b);
        border-radius: 20px;
        padding: 28px 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex: 1;
        align-items: center;
      }

      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: var(--f-b-w);
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: var(--f-sub);
        margin-top: 20px;
        text-align: center;
      }

      /* ── Control Panel (온도 / 바람) ── */
      .control-panel {
        border: 9px solid var(--f-b-w);
        border-radius: 20px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: var(--bg-w-b);
        position: relative;
        overflow: hidden;
      }

      .ctrl-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 22px 0;
        font-size: 5rem;
        font-weight: 900;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
      }

      .ctrl-btn:active {
        transform: scale(0.96);
        opacity: 0.85;
      }

      .ctrl-btn.blue {
        background: var(--p-blue);
        color: var(--f-b-w);
      }
      .ctrl-btn.yellow {
        background: var(--p-yellow);
        color: var(--f-b-w);
      }

      .ctrl-label {
        font-size: 5rem;
        font-weight: 700;
        color: var(--f-b-w);
      }
      .status-card.off {
        background: var(--gr-r);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>에어컨</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <!-- Left: status + power -->
        <div class="left-col">
          <div class="status-card" id="onStatus">
            <div>
              <div class="status-value" id="tempDisplay">24°C</div>
              <div class="status-label">설정 온도</div>
            </div>
            <div>
              <div class="status-value" id="windDisplay">중</div>
              <div class="status-label">바람 세기</div>
            </div>
          </div>
          <div class="status-card off" id="offStatus" style="display: none">
            <div class="status-value">꺼짐</div>
            <div class="status-label"><span>현재 실내 26°C</span></div>
          </div>

          <button class="power-btn off" id="powerBtn" onclick="togglePower()">
            전원 끄기
          </button>
        </div>

        <!-- Center: 온도 control -->
        <div class="control-panel">
          <div class="overlay" style="display: none" id="tempOverlay"></div>
          <button class="ctrl-btn blue" onclick="changeTemp(1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,24 18,12 30,24"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <span class="ctrl-label">온도</span>
          <button class="ctrl-btn blue" onclick="changeTemp(-1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,12 18,24 30,12"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>

        <!-- Right: 바람 control -->
        <div class="control-panel">
          <div class="overlay" style="display: none" id="windOverlay"></div>
          <button class="ctrl-btn yellow" onclick="changeWind(1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,24 18,12 30,24"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <span class="ctrl-label">바람</span>
          <button class="ctrl-btn yellow" onclick="changeWind(-1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,12 18,24 30,12"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <script>
      let temp = 24;
      const windLevels = ["약", "중", "강"];
      let windIndex = 1;
      let isOn = true;
      function togglePower() {
        isOn = !isOn;

        const powerBtn = document.getElementById("powerBtn");
        const onCard = document.getElementById("onStatus");
        const offCard = document.getElementById("offStatus");
        const tempOverlay = document.getElementById("tempOverlay");
        const windOverlay = document.getElementById("windOverlay");

        if (isOn) {
          // ON state
          powerBtn.textContent = "전원 끄기";
          powerBtn.className = "power-btn off";
          onCard.style.display = "grid";
          offCard.style.display = "none";
          tempOverlay.style.display = "none";
          windOverlay.style.display = "none";
        } else {
          // OFF state
          powerBtn.textContent = "전원 켜기";
          powerBtn.className = "power-btn on";
          onCard.style.display = "none";
          offCard.style.display = "flex";
          tempOverlay.style.display = "block";
          windOverlay.style.display = "block";
        }
      }

      function changeTemp(delta) {
        temp = Math.min(30, Math.max(16, temp + delta));
        document.getElementById("tempDisplay").textContent = temp + "°C";
      }

      function changeWind(delta) {
        windIndex = Math.min(2, Math.max(0, windIndex + delta));
        document.getElementById("windDisplay").textContent =
          windLevels[windIndex];
      }
    </script>
  </body>
</html>
