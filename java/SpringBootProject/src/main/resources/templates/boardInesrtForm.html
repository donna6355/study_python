<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script
	src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container">
		<h2>Leave Measge at Mir Isaac Kim's Homepage</h2>
		<div class="card">
			<div class="card-header">Board Editing</div>
			<div class="card-body">
				<form action="boardInsert.do" method="post">
					<table class="table table-bordered table-hover">
						<tr>
							<td>Title</td>
							<td><input name="title" type="text" class="form-control"></td>
						</tr>
						<tr>
							<td>Writer</td>
							<td><input name="writer" type="text" class="form-control"></td>
						</tr>
						<tr>
							<td>Content</td>
							<td><textarea name="content" class="form-control" cols=""
									rows="7"></textarea></td>
						</tr>
					
						<tr>
							<td align="center" colspan="2"><a href="boardList.do">
									<button class="btn btn-info" type="button">Cancel</button>
							</a>
								<button type="reset" class="btn btn-danger">Reset</button>
								<button type="submit" class="btn btn-warning">Write</button></td>
						</tr>
					</table>
				</form>
			</div>
			<div class="card-footer">LG DX School</div>
		</div>
	</div>
</body>
</html>
