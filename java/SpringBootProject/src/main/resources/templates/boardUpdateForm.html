<!DOCTYPE html>
<html xmlns:th=http://www.thymeleaf.org>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script
	src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
	<div class="container">
		<div class="card">
			<div class="card-header">Boot Board Editing</div>
			<div class="card-body">
				<form action="boardUpdate.do" method="post">
					<input type="hidden" th:value="${vo.idx}" name="idx" class="form-control">
					<table class="table table-bordered table-hover">
						<tr>
							<td>Title</td>
							<td><input th:value="${vo.title}" name="title" type="text"
								class="form-control"></td>
						</tr>
						<tr>
							<td>Writer</td>
							<td><input th:value="${vo.writer}" name="writer" type="text" class="form-control"></td>
						</tr>
						<tr>
							<td>Content</td>
							<td><textarea th:text="${vo.content}" name="content" class="form-control" cols=""
									rows="7"></textarea></td>
						</tr>

						<tr>
							<td align="center" colspan="2"><a href="boardList.do">
									<button class="btn btn-info" type="button">Cancel</button>
							</a>
								<button type="reset" class="btn btn-danger">Reset</button>
								<button type="submit" class="btn btn-warning">Modify</button></td>
						</tr>
					</table>
				</form>
			</div>
			<div class="card-footer">LG DX School</div>
		</div>
	</div>

</body>
</html>
