<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 공기청정기</title>
    <style>
      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff;
        font-family:
          "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
        min-height: 100vh;
        padding: 24px;
      }
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 80vh;
        background: #f4f6f9;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      .back-btn {
        position: absolute;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      .back-btn .arrow {
        font-size: 3rem;
        color: #1a1a1a;
        line-height: 1;
      }

      .back-btn .label {
        font-size: 1.75rem;
        color: #1a1a1a;
      }

      .home-btn {
        position: absolute;
        right: 0;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: #1a1a1a;
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1.3fr 0.6fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 48px;
      }
      .puri-panel {
        background: linear-gradient(180deg, #d7d8db, #d2def7);
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 20px;
        justify-content: center;
        text-align: center;
      }
      .puri-panel.off {
        background: linear-gradient(180deg, #d7d8db, #e8a0b0);
      }

      /* Status Card */
      .status-card {
        background: linear-gradient(180deg, #d7d8db, #a3d3b7);
        border-radius: 20px;
        padding: 28px 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex: 1;
        align-items: center;
      }

      .status-card.off {
        background: linear-gradient(180deg, #d9d9d9, #afb0b1);
      }
      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: #1a1a1a;
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: #444;
        margin-top: 20px;
        text-align: center;
      }

      /* Power Button */
      .power-btn {
        background: #e95151;
        color: #000;
        border: none;
        border: 9px solid #000;
        border-radius: 20px;
        padding: 52px;
        font-size: 6.5rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }

      .power-btn:hover {
        background: #c92a2a;
      }
      .power-btn:active {
        transform: scale(0.97);
      }

      /* ── Control Panel (온도 / 바람) ── */
      .control-panel {
        border: 9px solid #1a1a1a;
        border-radius: 20px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: #fff;
        position: relative;
        overflow: hidden;
      }

      .ctrl-btn {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 22px 0;
        font-size: 5rem;
        font-weight: 900;
        cursor: pointer;
        transition:
          opacity 0.15s ease,
          transform 0.1s ease;
      }

      .ctrl-btn:active {
        transform: scale(0.96);
        opacity: 0.85;
      }

      .ctrl-btn.blue {
        background: #5799ec;
        color: #1a1a1a;
      }
      .ctrl-btn.yellow {
        background: #ffd050;
        color: #1a1a1a;
      }

      .ctrl-label {
        font-size: 5rem;
        font-weight: 700;
        color: #1a1a1a;
      }

      /* Power button states */
      .power-btn.off {
        background: #e03131; /* red - turn off */
      }

      .power-btn.on {
        background: #2f9e44; /* green - turn on */
      }

      .power-btn.off:hover {
        background: #c92a2a;
      }
      .power-btn.on:hover {
        background: #276e35;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(100, 100, 100, 0.55);
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>공기청정기</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <!-- Left: status + power -->
        <div class="left-col">
          <div class="status-card" id="statusCard">
            <div>
              <div class="status-value" id="tempDisplay">보통</div>
              <div class="status-label">종합 청정도</div>
            </div>
            <div>
              <div class="status-value">30%</div>
              <div class="status-label">실내 습도</div>
            </div>
          </div>

          <button class="power-btn off" id="powerBtn" onclick="togglePower()">
            전원 끄기
          </button>
        </div>

        <div class="puri-panel" id="puriPanel">
          <div class="status-value" id="windDisplay">약</div>
          <div class="status-label" id="windOff">청정 세기</div>
        </div>

        <!-- Right: 바람 control -->
        <div class="control-panel">
          <div class="overlay" style="display: none" id="puriOverlay"></div>
          <button class="ctrl-btn yellow" onclick="changeWind(1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,24 18,12 30,24"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <span class="ctrl-label">세기</span>
          <button class="ctrl-btn yellow" onclick="changeWind(-1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,12 18,24 30,12"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <script>
      const windLevels = ["약", "중", "강"];
      let windIndex = 0;
      let isOn = true;
      function togglePower() {
        isOn = !isOn;

        const powerBtn = document.getElementById("powerBtn");
        const statusCard = document.getElementById("statusCard");
        const windLabel = document.getElementById("windOff");
        const windDisplay = document.getElementById("windDisplay");
        const puriPanel = document.getElementById("puriPanel");
        const puriOverlay = document.getElementById("puriOverlay");

        if (isOn) {
          // ON state
          powerBtn.textContent = "전원 끄기";
          windDisplay.textContent = windLevels[windIndex];
          powerBtn.className = "power-btn off";
          statusCard.classList.remove("off");
          puriPanel.classList.remove("off");
          puriOverlay.style.display = "none";
          windLabel.style.display = "block";
        } else {
          // OFF state
          powerBtn.textContent = "전원 켜기";
          windDisplay.textContent = "꺼짐";
          powerBtn.className = "power-btn on";
          statusCard.classList.add("off");
          puriPanel.classList.add("off");
          puriOverlay.style.display = "block";
          windLabel.style.display = "none";
        }
      }

      function changeWind(delta) {
        windIndex = Math.min(2, Math.max(0, windIndex + delta));
        document.getElementById("windDisplay").textContent =
          windLevels[windIndex];
      }
    </script>
  </body>
</html>
