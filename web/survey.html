<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey</title>
</head>
<body>
  <header>
    <h1>Tell me your cat favorite!</h1>
    <a href="index.html">Back to Home</a>
  </header>
  <main>      
    <img src="https://play-lh.googleusercontent.com/IGM7Yi3xNRS0UD3Iv5W-jI8NwZwZrbnxTR9mA1iGzX1F8ZPL2n4_-n61O_Vcxet2Zw=w2560-h1440-rw"
      alt="Isaac's diary">
    
    <form>
      <label>Name : </label>
      <input type="text" placeholder="Enter your name">
      <br>
      <label>Email : </label>
      <input type="email" placeholder="Enter your email">
      <br>
      <p>Do you have cats?</p>
      <label for="yescat">Yes</label> <input type="radio" id="yescat" name="have">
      <label for="nocat">No</label> <input type="radio" id="nocat" name="have">
      <br>
      <p>Select your favorite cat breed:</p>
   
      <input type='checkbox'>Korean Shorthair</option>
      <input type='checkbox'>British Shorthair</option>
      <input type='checkbox'>American Shorthair</option>
      <input type='checkbox'>Norwegian Forest Cat</option>
      <br>
      <input type='checkbox'>Persian</option>
      <input type='checkbox'>Scottish Fold</option>
      <input type='checkbox'>Sphynx</option>
      <input type='checkbox'>Others</option>
      <br>
      <br>
      <label>Leave a message to your cat:</label>
      <textarea placeholder="leave message to your cat"> </textarea>
      <hr>
      <button type="submit">Reset</button>
      <button type="reset">Submit</button>
    </form>
  </main>
</body>
</html>
