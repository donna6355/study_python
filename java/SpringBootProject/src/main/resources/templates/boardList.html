<!DOCTYPE html>
<html xmlns:th=http://www.thymeleaf.org>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>


<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<script
	src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<div class="container">
		<h2>Spring Boot Board</h2>
		<div class="card">
			<div class="card-header">Board List</div>
			<div class="card-body">
				<table class="table table-bordered table-hover">
					<thead>
						<tr class="table-info">
							<td>idx</td>
							<td>title</td>
							<td>writer</td>
							<td>date</td>
							<td>view</td>
						</tr>
					</thead>
					<tbody>
					<!-- thymeleaf loop th attribute -->
					<tr th:each="vo : ${list}">
						<td th:text="${vo.idx}"></td>
						<td><a th:href="@{/boardContent.do(idx=${vo.idx})}">[[${vo.title}]]</a></td>
						<td th:text="${vo.writer}"></td>
						<td th:text="${vo.indate}"></td>
						<td th:text="${vo.count}"></td>
					</tr>
					</tbody>

				</table>
				 <a href="boardInesrtForm.do">
					<button class="btn btn-primary">Write</button>
				</a>
			</div>
			<div class="card-footer">LG DX School -</div>
		</div>
	</div>
</body>
</html>
