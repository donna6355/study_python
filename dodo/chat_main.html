<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LG DoDo - 수어 대화</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>

    <style>
      /* Home screen styles — responsive action buttons */
      p {
        margin: 24px;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "LG Smart UI", "Inter";
        background: var(--bg-white);
      }

      .chat-screen {
        background: var(--bg-light);
        min-width: 100vw - 40px;
        min-height: 95vh;
        display: grid;
        place-items: start center;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        width: 95%;
      }
      header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        padding: 24px 20px;
      }
      .home-btn {
        position: absolute;
        left: 20px;
        right: inherit;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        margin: 0;
        letter-spacing: -1px;
      }
      .action-btn {
        appearance: none;
        border: var(--border);
        background: var(--bg-w-b);
        color: var(--f-b-w);
        padding: 80px 18px;
        border-radius: 40px;
        font-size: 2.5rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          opacity 120ms ease;
        width: 100%;
      }

      .action-content img {
        height: 160px;
        padding: 24px 0 0;
      }
      .label {
        font-size: 5.5rem;
        color: var(--f-b-y);
      }

      .action-btn:active {
        transform: translateY(1px);
      }
      .action-btn:hover {
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }
      /* Wider screens: lay out buttons horizontally */
      @media (min-width: 720px) {
        .home-screen {
          padding: 36px;
        }
        .actions {
          flex-direction: row;
          gap: 20px;
        }
        .action-btn {
          flex: 1 1 0;
        }
      }

      /* Very wide / landscape: use grid for more than 4 actions */
      @media (min-width: 1100px) {
        .actions {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="chat-screen">
      <header>
        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
        <h1>수어 대화</h1>
      </header>
      <section class="actions" role="navigation" aria-label="주요 기능">
        <button class="action-btn" type="button">
          <div class="action-content">
            <img src="src/icon_rtchat.png" alt="DoDo chat" />
            <p class="label">실시간 대화</p>
            <p>실시간 수어 대화를 시작해요</p>
          </div>
        </button>
        <button class="action-btn" type="button">
          <div class="action-content">
            <img src="src/icon_report.png" alt="대화 리포트" />
            <p class="label no-margin">대화 리포트</p>
            <p class="no-margin">과거 대화 요약을 볼 수 있어요</p>
          </div>
        </button>
      </section>
    </div>
  </body>
</html>
