<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .splash-screen {
        background: var(--bg-splash);
        min-width: 100% - 40px;
        min-height: 95vh;
        display: grid;
        place-items: center;
      }

      .splash-logo {
        width: 40vw;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 9vw, 7.5rem);
        line-height: 0.9;
        letter-spacing: -0.04em;
        font-weight: 900;
        text-shadow: 0 16px 30px rgba(0, 0, 0, 0.16);
        transform: translateY(5px);
      }

      p {
        margin: 20px 0 0;
        font-size: clamp(2.5rem, 3vw, 1.4rem);
        line-height: 1.4;
        font-weight: 700;
        color: var(--bg-w-b);
        text-align: center;
      }
      @keyframes appear {
        from {
          opacity: 0;
          transform: scale(0.98);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-screen">
      <div class="content">
        <img src="src/splash_logo.png" alt="DoDo logo" class="splash-logo" />
        <div class="text">
          <p>말이 필요 없는 대화, DoDo</p>
        </div>
      </div>
    </div>
    <script>
      if (voiceMode == "true") {
        speak("말이 필요 없는 대화, 두두");
      }
      setTimeout(() => {
        window.location.href = "home.html";
      }, 2000);
    </script>
  </body>
</html>
