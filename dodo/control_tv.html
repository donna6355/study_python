<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 스마트 TV</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1.3fr 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* Status Card */
      .status-card {
        background: linear-gradient(180deg, #d7d8db, #d2ddf7);
        border-radius: 20px;
        padding: 28px 24px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex: 1;
        align-items: center;
      }

      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: var(--f-b-w);
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: var(--f-sub);
        margin-top: 20px;
        text-align: center;
      }
      .status-card.off {
        background: linear-gradient(180deg, #d9d9d9, #e8a0b0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>스마트 TV</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <!-- Left: status + power -->
        <div class="left-col">
          <div class="status-card" id="onStatus">
            <div>
              <div class="status-value" id="channelDisplay">7</div>
              <div class="status-label">현재 채널</div>
            </div>
            <div>
              <div class="status-value" id="volumeDisplay">8</div>
              <div class="status-label">볼륨</div>
            </div>
          </div>
          <div class="status-card off" id="offStatus" style="display: none">
            <div class="status-value">꺼짐</div>
          </div>

          <button class="power-btn off" id="powerBtn" onclick="togglePower()">
            전원 끄기
          </button>
        </div>

        <!-- Center: 채널 control -->
        <div class="control-panel">
          <div class="overlay" style="display: none" id="channelOverlay"></div>
          <button class="ctrl-btn blue" onclick="changeChannel(1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,24 18,12 30,24"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <span class="ctrl-label">채널</span>
          <button class="ctrl-btn blue" onclick="changeChannel(-1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,12 18,24 30,12"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>

        <!-- Right: 볼륨 control -->
        <div class="control-panel">
          <div class="overlay" style="display: none" id="volOverlay"></div>
          <button class="ctrl-btn yellow" onclick="changeVolume(1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,24 18,12 30,24"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <span class="ctrl-label">볼륨</span>
          <button class="ctrl-btn yellow" onclick="changeVolume(-1)">
            <svg
              width="140"
              height="140"
              viewBox="0 0 36 36"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <polyline
                points="6,12 18,24 30,12"
                stroke="#1a1a1a"
                stroke-width="4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>
    </main>

    <script>
      let channel = 7;
      let volume = 8;
      let windIndex = 1;
      let isOn = true;
      function togglePower() {
        isOn = !isOn;

        const powerBtn = document.getElementById("powerBtn");
        const onCard = document.getElementById("onStatus");
        const offCard = document.getElementById("offStatus");
        const channelOverlay = document.getElementById("channelOverlay");
        const volOverlay = document.getElementById("volOverlay");

        if (isOn) {
          // ON state
          powerBtn.textContent = "전원 끄기";
          powerBtn.className = "power-btn off";
          onCard.style.display = "grid";
          offCard.style.display = "none";
          channelOverlay.style.display = "none";
          volOverlay.style.display = "none";
        } else {
          // OFF state
          powerBtn.textContent = "전원 켜기";
          powerBtn.className = "power-btn on";
          onCard.style.display = "none";
          offCard.style.display = "flex";
          channelOverlay.style.display = "block";
          volOverlay.style.display = "block";
        }
      }

      function changeChannel(delta) {
        channel = Math.min(100, Math.max(1, channel + delta));
        document.getElementById("channelDisplay").textContent = channel;
      }

      function changeVolume(delta) {
        volume = Math.min(30, Math.max(0, volume + delta));
        document.getElementById("volumeDisplay").textContent = volume;
      }
    </script>
  </body>
</html>
