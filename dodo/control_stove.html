<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 전기레인지</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      /* Status Card */
      .status-card {
        background: linear-gradient(180deg, #d7d8db, #d2ddf7);
        border-radius: 20px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .status-top {
        width: 90%;
        display: flex;
        flex-direction: row;
        flex: 1;
        align-items: center;
        justify-content: space-between;
      }

      .dot-label {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 12px;
      }

      .status-dot {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--p-green);
        flex-shrink: 0;
        margin-right: 16px;
      }

      .status-dot.sleep {
        background: var(--p-red);
      }
      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: var(--f-b-w);
        text-align: center;
      }
      .status-top-label {
        font-size: 3rem;
        font-weight: 700;
        color: var(--f-b-w);
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: var(--f-sub);
        text-align: center;
      }
      .current-status {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      /* Power Button */
      .power-btn {
        border: 6px solid var(--f-b-w);
        border-radius: 24px;
        padding: 24px;
        font-size: 3rem;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
      }
      .status-card.off {
        background: linear-gradient(180deg, #d9d9d9, #e8a0b0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>전기레인지</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <div class="left-col">
          <div class="status-card" id="statusCardOne">
            <div class="status-top">
              <div class="status-top-label">1번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotOne"></div>
                <div class="status-top-label" id="statusLabelOne">사용 중</div>
              </div>
            </div>
            <div class="status-top" id="statusOne">
              <div>
                <div class="status-value">8</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">59분</div>
                <div class="status-label">타이머</div>
              </div>
              <button class="power-btn" onclick="togglePower('One')">
                끄기
              </button>
            </div>
          </div>
          <div class="status-card off" id="statusCardTwo">
            <div class="status-top">
              <div class="status-top-label">2번 화구</div>
              <div class="dot-label">
                <div class="status-dot sleep" id="statusDotTwo"></div>
                <div class="status-top-label" id="statusLabel">꺼짐</div>
              </div>
            </div>
          </div>
        </div>
        <div class="left-col">
          <div class="status-card" id="statusCardThree">
            <div class="status-top">
              <div class="status-top-label">3번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotThree"></div>
                <div class="status-top-label" id="statusLabelThree">
                  사용 중
                </div>
              </div>
            </div>
            <div class="status-top" id="statusThree">
              <div>
                <div class="status-value">4</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">48분</div>
                <div class="status-label">타이머</div>
              </div>
              <button class="power-btn" onclick="togglePower('Three')">
                끄기
              </button>
            </div>
          </div>
          <div class="status-card" id="statusCardFour">
            <div class="status-top">
              <div class="status-top-label">4번 화구</div>
              <div class="dot-label">
                <div class="status-dot" id="statusDotFour"></div>
                <div class="status-top-label" id="statusLabelFour">사용 중</div>
              </div>
            </div>
            <div class="status-top" id="statusFour">
              <div>
                <div class="status-value">5</div>
                <div class="status-label">화력</div>
              </div>
              <div>
                <div class="status-value">55분</div>
                <div class="status-label">타이머</div>
              </div>
              <button
                class="power-btn"
                id="powerBtnFour"
                onclick="togglePower('Four')"
              >
                끄기
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script>
      function togglePower(num) {
        const status = document.getElementById(`status${num}`);
        const statusDot = document.getElementById(`statusDot${num}`);
        const statusLabel = document.getElementById(`statusLabel${num}`);
        const statusCard = document.getElementById(`statusCard${num}`);
        status.style.display = "none";
        statusDot.classList.add("sleep");
        statusLabel.textContent = "꺼짐";
        statusCard.classList.add("off");
      }
    </script>
  </body>
</html>
