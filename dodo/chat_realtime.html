<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LG DoDo - 실시간 대화</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>

    <style>
      .chat-screen {
        background: var(--bg-light);
        min-width: 100vw - 40px;
        min-height: 95vh;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        width: 95%;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }
      .home-btn {
        position: absolute;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        margin: 0;
        letter-spacing: -1px;
      }
      .chat {
        width: 100%;
        display: grid;
        grid-template-columns: 1.3fr 1fr;
        gap: 16px;
        align-items: stretch;
      }

      .chat-part {
        width: 100%;
        height: 100vh;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .chat-start {
        border-radius: 20px;
        width: 100%;
        background: var(--bg-grey);
        font-size: 2rem;
        text-align: center;
        padding: 12px;
      }
      .chat-row {
        display: flex;
        flex-direction: row;
        gap: 16px;
        margin: 16px 0;
        opacity: 0;
        visibility: hidden;
        transform: translateY(18px) scale(0.96); /* 살짝 아래, 살짝 작게 */
        transition:
          opacity 0.45s ease,
          transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
          visibility 0.45s;
      }
      .chat-row.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1);
      }
      .chat-bubble {
        border-radius: 20px;
        width: 100%;
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        padding: 36px 0;
      }
      .chat-bubble.green {
        background: #a3d3b7;
      }
      .chat-bubble.red {
        background: #fac6b7;
      }
      .chat-bubble.yellow {
        background: #fbd898;
      }

      .terminate {
        position: absolute;
        bottom: 40px;
        border-radius: 12px;
        gap: 2px;
        background: var(--p-red);
        border: none;
        cursor: pointer;
        font-weight: 700;
        font-size: 1.5rem;
        color: var(--bg-white);
        padding: 16px 48px;
      }
      img.ani {
        opacity: 0;
        visibility: hidden;
        transform: translateY(18px) scale(0.96); /* 살짝 아래, 살짝 작게 */
        transition:
          opacity 0.45s ease,
          transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
          visibility 0.45s;
      }
      img.ani.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1);
      }
    </style>
  </head>
  <body>
    <div class="chat-screen">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>
        <h1>실시간 대화</h1>
        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>
      <section class="chat" role="navigation" aria-label="주요 기능">
        <div class="chat-part">
          <div class="chat-start">대화를 시작합니다.</div>
          <div class="chat-row" id="chat0">
            <img src="src/icon_sp_1.png" width="100px" />
            <p class="chat-bubble green">오늘 날씨 어때?</p>
          </div>
          <div class="chat-row" id="chat1">
            <img src="src/icon_sp_0.png" width="100px" />
            <p class="chat-bubble red">오늘 엄청 덥대</p>
          </div>
          <div class="chat-row" id="chat2">
            <p class="chat-bubble yellow">여름은 여름이네 엄청 덥다</p>
            <div style="width: 60px"></div>
          </div>
          <button class="terminate">대화 종료</button>
        </div>
        <div>
          <img
            class="ani"
            id="cam"
            src="src/img_cam.png"
            width="100%"
            style="padding-right: 20px; margin-bottom: 16px"
          />
          <img
            class="ani"
            id="avatar"
            src="src/img_avatar.png"
            height="320px"
          />
        </div>
      </section>
    </div>

    <script>
      const cam = document.getElementById("cam");
      const avatar = document.getElementById("avatar");
      const chat0 = document.getElementById("chat0");
      const chat1 = document.getElementById("chat1");
      const chat2 = document.getElementById("chat2");
      setTimeout(() => {
        cam.classList.add("show");
      }, 200);
      setTimeout(() => {
        chat0.classList.add("show");
      }, 1000);
      setTimeout(() => {
        chat1.classList.add("show");
      }, 2000);
      setTimeout(() => {
        chat2.classList.add("show");
        avatar.classList.add("show");
      }, 3000);
    </script>
  </body>
</html>
