<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LG DoDo - 로봇청소기</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="theme.js"></script>
    <style>
      .control-dashboard {
        min-width: 100% - 40px;
        min-height: 95vh;
        background: var(--bg-light);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        position: relative;
        margin-bottom: 32px;
      }

      h1 {
        font-size: 5.5rem;
        font-weight: 700;
        color: var(--f-b-w);
        letter-spacing: -1px;
      }

      /* ── Main Grid ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        align-items: stretch;
      }

      /* ── Left Column ── */
      .left-col {
        display: flex;
        flex-direction: column;
        gap: 48px;
      }

      /* Status Card */
      .status-card {
        border: var(--border);
        background: var(--gr-b);
        border-radius: 20px;
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .status-card.off {
        background: var(--gr-r);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .status-top {
        width: 80%;
        height: 30%;
        display: flex;
        flex-direction: row;
        flex: 1;
        align-items: center;
        justify-content: space-between;
      }

      .status-dot {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: var(--p-green);
        flex-shrink: 0;
        margin-right: 16px;
      }

      .status-dot.sleep {
        background: var(--p-red);
      }
      .status-dot.charge {
        background: var(--p-yellow);
      }
      .status-value {
        font-size: 5rem;
        font-weight: 800;
        color: var(--f-b-y);
        text-align: center;
      }

      .status-label {
        font-size: 2.5rem;
        color: var(--f-sub);
        margin-top: 20px;
        text-align: center;
      }
      .current-status {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        flex: 1;
      }

      .charge-btn {
        background: var(--p-yellow);
        color: var(--p-black);
        border: 9px solid var(--f-b-w);
        border-radius: 20px;
        padding: 52px;
        font-size: 6.5rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: -1px;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
        position: relative;
        overflow: hidden;
      }

      .charge-btn:hover {
        background: var(--p-yellow-hover);
      }
      .charge-btn:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <main class="control-dashboard">
      <header>
        <button class="back-btn" onclick="history.back()" aria-label="이전으로">
          <span class="arrow">←</span>
          <span class="label">이전</span>
        </button>

        <h1>로봇청소기</h1>

        <button
          class="home-btn"
          onclick="location.href = 'home.html'"
          type="button"
          aria-label="홈으로 이동"
        >
          <img
            src="src/icon_home.png"
            alt="홈으로 가기 아이콘"
            width="120"
            height="120"
          />
        </button>
      </header>

      <div class="main-grid">
        <div class="status-card" id="onStatus">
          <div class="status-top">
            <div>
              <div class="status-value" id="channelDisplay">거실</div>
              <div class="status-label">현재 위치</div>
            </div>
            <div>
              <div class="status-value" id="volumeDisplay">35%</div>
              <div class="status-label">배터리</div>
            </div>
          </div>

          <div class="current-status">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-value" id="statusLabel">청소 중</div>
          </div>
        </div>
        <div class="left-col">
          <button
            class="charge-btn off"
            id="chargeBtn"
            onclick="toggleCharge()"
          >
            <div class="overlay" style="display: none" id="chargeOverlay"></div>
            충전대로 이동
          </button>
          <button class="power-btn off" id="powerBtn" onclick="togglePower()">
            청소 중지
          </button>
        </div>
      </div>
    </main>

    <script>
      let isOff = false;
      let isCharging = false;
      const statusDot = document.getElementById("statusDot");
      const statusLabel = document.getElementById("statusLabel");
      const powerBtn = document.getElementById("powerBtn");
      const chargeBtn = document.getElementById("chargeBtn");
      const chargeOverlay = document.getElementById("chargeOverlay");
      const statusCard = document.getElementById("onStatus");

      function togglePower() {
        if (isOff) {
          // 청소 중 상태로 전환
          powerBtn.textContent = "청소 중지";
          powerBtn.classList.remove("on");
          powerBtn.classList.add("off");

          statusLabel.textContent = "청소 중";
          statusDot.classList.remove("sleep");
          statusDot.classList.remove("charge");
          statusCard.classList.remove("off");
          isOff = false;
        } else {
          // 정지 상태로 전환
          powerBtn.textContent = "청소 시작";
          powerBtn.classList.remove("off");
          powerBtn.classList.add("on");

          statusLabel.textContent = "일시 정지";
          statusDot.classList.remove("charge");
          statusDot.classList.add("sleep");
          statusCard.classList.add("off");
          isOff = true;
        }
        chargeOverlay.style.display = "none";
        isCharging = false;
      }

      function toggleCharge() {
        if (isCharging) {
          return;
        } else {
          chargeBtn.classList.remove("off");
          chargeBtn.classList.add("on");
          powerBtn.textContent = "청소 시작";
          powerBtn.classList.remove("off");
          powerBtn.classList.add("on");
          statusCard.classList.add("off");

          statusLabel.textContent = "충전 중";
          statusDot.classList.add("charge");
          chargeOverlay.style.display = "block";
          isCharging = true;
          isOff = true;
        }
      }
      if (voiceMode == "true") {
        speak("로봇청소기 청소 중, 충전대로 이동, 청소 중지");
      }
    </script>
  </body>
</html>
