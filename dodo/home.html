<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LG DoDo</title>
    <style>
      /* Home screen styles — responsive action buttons */
      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "LG Smart UI";
        src: url("src/LG Smart UI Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg: #ffffff;
        --card: #f4f6f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "LG Smart UI",
          "Inter",
          system-ui,
          -apple-system,
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          sans-serif;
        background: var(--bg);
      }

      .home-screen {
        margin: 20px;
        background: var(--card);
        min-width: 100vw - 40px;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .button {
        width: 200vw;
        margin: 24px;
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: stretch;
      }

      .home-header {
        display: flex;
        align-items: center;
        gap: 16px;
        font-weight: 700;
        font-size: 3rem;
      }

      .home-header h1 {
        margin: 0;
        font-size: 3rem;
        color: #bb466b;
        font-weight: 700;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        width: 95%;
      }

      .action-btn {
        appearance: none;
        border: 0;
        background: #fff;
        color: #000;
        padding: 16px 18px;
        border-radius: 40px;
        font-size: 2.5rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          opacity 120ms ease;
        width: 100%;
      }

      .action-content img {
        height: 160px;
        padding: 24px 0 0;
      }
      .label {
        font-size: 5.5rem;
      }

      .action-btn:active {
        transform: translateY(1px);
      }
      .action-btn:hover {
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }
      /* Wider screens: lay out buttons horizontally */
      @media (min-width: 720px) {
        .home-screen {
          padding: 36px;
        }
        .actions {
          flex-direction: row;
          gap: 20px;
        }
        .action-btn {
          flex: 1 1 0;
        }
      }

      /* Very wide / landscape: use grid for more than 4 actions */
      @media (min-width: 1100px) {
        .actions {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="home-screen">
      <header class="home-header">
        <h1>LG DoDo</h1>
      </header>

      <section class="actions" role="navigation" aria-label="주요 기능">
        <button class="action-btn" type="button">
          <div class="action-content">
            <img src="src/icon_chat.png" alt="DoDo chat" class="chat-icon" />
            <p class="label">수어 대화</p>
            <p>실시간으로 수어로 대화해요</p>
          </div>
        </button>
        <button
          class="action-btn"
          onclick="location.href = 'control_dashboard.html'"
          type="button"
        >
          <div class="action-content">
            <img
              src="src/icon_control.png"
              alt="가전 제어"
              class="control-icon"
            />
            <p class="label">가전 제어</p>
            <p>우리집 가전을 쉽게 관리해요</p>
          </div>
        </button>
        <button class="action-btn" type="button">
          <div class="action-content">
            <img
              src="src/icon_my_page.png"
              alt="마이 페이지"
              class="my-page-icon"
            />
            <p class="label">마이 페이지</p>
            <p>나에게 맞는 화면으로 설정해요</p>
          </div>
        </button>
      </section>
    </div>
  </body>
</html>
